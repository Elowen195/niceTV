services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nicetv
      POSTGRES_USER: nicetv
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in backend/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nicetv -d nicetv"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=20

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADDR: :8080
      DATABASE_URL: postgres://nicetv:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in backend/.env}@postgres:5432/nicetv?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in backend/.env}
      ACCESS_TOKEN_TTL: 15m
      REFRESH_TOKEN_TTL: 720h
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  pgdata:
