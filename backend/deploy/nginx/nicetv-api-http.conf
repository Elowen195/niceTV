# Install to /etc/nginx/conf.d/nicetv-api-http.conf.
# This file is loaded in nginx's http context.

upstream nicetv_api {
    server 127.0.0.1:8080;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=nicetv_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=nicetv_write:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=nicetv_read:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=nicetv_conn:10m;
