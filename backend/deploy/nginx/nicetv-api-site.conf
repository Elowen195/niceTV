# Install to /etc/nginx/sites-available/nicetv-api and symlink into sites-enabled.
# Replace api.linux-de.me and certificate paths if your domain differs.

server {
    listen 80;
    listen [::]:80;
    server_name api.linux-de.me;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.linux-de.me;

    ssl_certificate /etc/letsencrypt/live/api.linux-de.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.linux-de.me/privkey.pem;

    client_max_body_size 1m;
    limit_conn nicetv_conn 20;
    limit_req_status 429;

    if ($nicetv_country_blocked) {
        return 403;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    location = /healthz {
        limit_req zone=nicetv_read burst=20 nodelay;
        proxy_pass http://nicetv_api;
    }

    location ~ ^/v1/auth/(login|register|refresh)$ {
        limit_req zone=nicetv_auth burst=5 nodelay;
        proxy_pass http://nicetv_api;
    }

    location ~ ^/v1/(comments|collections|favorites|video-refs) {
        limit_req zone=nicetv_write burst=20 nodelay;
        proxy_pass http://nicetv_api;
    }

    location / {
        limit_req zone=nicetv_read burst=60 nodelay;
        proxy_pass http://nicetv_api;
    }
}
